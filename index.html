<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elevate Daily</title>
<meta name="theme-color" content="#f7f7f5">

<style>
:root{
  --bg:#f7f7f5;
  --card:#ffffff;
  --text:#1a1a1a;
  --muted:#6b6b6b;
  --accent:#c6a95a;
  --border:rgba(0,0,0,.08);
  --shadow:0 10px 30px rgba(0,0,0,.06);
  --radius:18px;
}

*{box-sizing:border-box;}

html,body{
  margin:0;
  padding:0;
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
}

/* CONTAINER */
.container{
  max-width:800px;
  margin:0 auto;
  padding:20px;
}

/* HEADER */
header{
  text-align:center;
  margin-bottom:20px;
}

.day-heading{
  font-size:1.8rem;
  font-weight:700;
  margin:0;
}

/* NAV */
.day-nav{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:8px;
  margin:15px 0;
}

.day-nav a{
  padding:8px 14px;
  border-radius:999px;
  border:1px solid var(--border);
  background:white;
  text-decoration:none;
  color:var(--text);
}

.day-nav a:hover{
  background:#f2f2f2;
}

/* CARDS */
.glass{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:18px;
  margin-bottom:16px;
  box-shadow:var(--shadow);
}

/* TEXT */
h2{
  margin:0 0 10px;
  font-size:1.2rem;
}

/* INPUTS */
textarea,input{
  width:100%;
  padding:10px;
  border-radius:12px;
  border:1px solid var(--border);
  margin-bottom:10px;
  background:white;
}

textarea:focus,input:focus{
  outline:none;
  border-color:var(--accent);
}

/* BUTTONS */
button{
  padding:10px 16px;
  border-radius:999px;
  border:1px solid var(--border);
  background:white;
  cursor:pointer;
}

button:hover{
  background:#f2f2f2;
}

.btn-primary{
  background:var(--accent);
  color:white;
  border:none;
}

/* TASKS */
.task-input-group{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

#task-list{
  margin-top:10px;
}

/* FOOTER */
footer{
  text-align:center;
  margin-top:20px;
  color:var(--muted);
}
</style>
</head>

<body>

<div class="container">

<header>
  <h1 class="day-heading">Elevate Daily</h1>
</header>

<!-- NAV -->
<div class="day-nav">
  <a href="#">Mon</a>
  <a href="#">Tue</a>
  <a href="#">Wed</a>
  <a href="#">Thu</a>
  <a href="#">Fri</a>
</div>

<!-- GRATITUDE -->
<div class="glass">
  <h2>Gratitude</h2>
  <textarea placeholder="What are you grateful for today?"></textarea>
</div>

<!-- JOURNAL -->
<div class="glass">
  <h2>Journal</h2>
  <textarea placeholder="Write your thoughts..."></textarea>
</div>

<!-- TASKS -->
<div class="glass">
  <h2>Tasks</h2>

  <div class="task-input-group">
    <input id="new-task" placeholder="Add a task">
    <button class="btn-primary" onclick="addTask()">Add</button>
  </div>

  <ul id="task-list"></ul>
</div>

<!-- FOOTER -->
<footer>
  Elevate your day with clarity and consistency.
</footer>

</div>

<script>
function addTask(){
  const input = document.getElementById("new-task");
  const list = document.getElementById("task-list");

  if(input.value.trim() === "") return;

  const li = document.createElement("li");
  li.textContent = input.value;

  li.onclick = () => li.remove();

  list.appendChild(li);
  input.value = "";
}
</script>

</body>
</html>
