<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elevate Daily</title>
<meta name="theme-color" content="#f7f7f5">

<style>
:root{
  --bg:#f7f7f5;
  --card:#ffffff;
  --text:#1a1a1a;
  --muted:#6b6b6b;
  --accent:#c6a95a;
  --border:rgba(0,0,0,.08);
  --radius:18px;
  --shadow:0 10px 30px rgba(0,0,0,.06);
}

/* RESET */
*{box-sizing:border-box;}
html,body{
  margin:0;
  padding:0;
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}

/* LAYOUT */
.container{
  max-width:850px;
  margin:auto;
  padding:20px;
}

/* HEADER */
header{
  text-align:center;
  margin-bottom:20px;
}

.day-heading{
  font-size:1.8rem;
  font-weight:700;
}

/* DAY NAV */
.day-nav{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  justify-content:center;
  margin-bottom:20px;
}

.day-nav a{
  padding:8px 14px;
  border-radius:999px;
  border:1px solid var(--border);
  text-decoration:none;
  color:var(--text);
  background:white;
}

.day-nav a:hover{
  background:#f2f2f2;
}

/* CARDS */
.glass{
  background:var(--card);
  border-radius:var(--radius);
  border:1px solid var(--border);
  box-shadow:var(--shadow);
  padding:16px;
  margin-bottom:16px;
}

/* TEXT */
h2{
  margin:0 0 10px;
}

/* INPUTS */
textarea,input{
  width:100%;
  padding:10px;
  border-radius:12px;
  border:1px solid var(--border);
  margin-bottom:10px;
}

textarea:focus,input:focus{
  outline:none;
  border-color:var(--accent);
}

/* BUTTONS */
button{
  padding:10px 16px;
  border-radius:999px;
  border:1px solid var(--border);
  background:white;
  cursor:pointer;
}

button:hover{
  background:#f2f2f2;
}

.btn-primary{
  background:var(--accent);
  color:white;
  border:none;
}

/* BREATHING */
#breath-bubble{
  width:200px;
  height:200px;
  border-radius:50%;
  background: radial-gradient(circle, #b8ecff, #6fd3ff);
  margin:20px auto;
}

/* TASKS */
#task-list{
  margin-top:10px;
}

/* FOOTER */
footer{
  text-align:center;
  margin-top:20px;
  color:var(--muted);
}
</style>
</head>

<body>

<div class="container">

<header>
  <h1 class="day-heading">Elevate Daily</h1>
</header>

<!-- DAY NAV -->
<div class="day-nav">
  <a href="#">Mon</a>
  <a href="#">Tue</a>
  <a href="#">Wed</a>
  <a href="#">Thu</a>
  <a href="#">Fri</a>
  <a href="#">Sat</a>
  <a href="#">Sun</a>
</div>

<!-- GRATITUDE -->
<div class="glass">
  <h2>Gratitude</h2>
  <textarea placeholder="What are you grateful for today?"></textarea>
</div>

<!-- JOURNAL -->
<div class="glass">
  <h2>Journal</h2>
  <textarea placeholder="Write your thoughts..."></textarea>
</div>

<!-- BREATHING -->
<div class="glass">
  <h2>Breathing</h2>
  <div id="breath-bubble"></div>
  <button onclick="startBreathing()">Start</button>
</div>

<!-- TASKS -->
<div class="glass">
  <h2>Tasks</h2>

  <input id="new-task" placeholder="Add a task">
  <button class="btn-primary" onclick="addTask()">Add Task</button>

  <ul id="task-list"></ul>
</div>

<!-- FOOTER -->
<footer>
  Elevate your day with clarity and consistency.
</footer>

</div>

<script>
function addTask(){
  const input=document.getElementById("new-task");
  const list=document.getElementById("task-list");

  if(input.value.trim()==="") return;

  const li=document.createElement("li");
  li.textContent=input.value;

  li.onclick=()=>li.remove();

  list.appendChild(li);
  input.value="";
}

/* BREATHING */
let breathing=false;
function startBreathing(){
  const bubble=document.getElementById("breath-bubble");
  breathing=!breathing;

  if(breathing){
    bubble.style.transition="transform 5s ease-in-out";
    bubble.style.transform="scale(1.3)";
    setTimeout(()=>{
      bubble.style.transform="scale(1)";
    },5000);
  }
}
</script>

</body>
</html>
